<div id="sidebar">
  <h2>Preguntas</h2>
  <div id="menuPreguntas"></div>
</div>

<div id="main">
    <h1>Test Front-end</h1>
  <div id="progress-container" style="display:none; width: 100%; max-width: 800px; margin: 10px auto;">
  <div id="progress-bar" style="height: 12px; background:#ccc; border-radius:6px;">
    <div id="progress-fill" style="height:12px; width:0%; background:#602b7a; border-radius:6px; transition:width .3s;"></div>

  </p>

   style="display:none;

⏱
</p>

  Aciertos: 0 / 0
</div>

<!-- ðŸ”¹ CONTROLES PARA GENERAR TEST (en la parte derecha) -->
<div id="random-test-box">
    <div class="row-arriba">
        <input type="number" id="random-count" min="1" max="247" placeholder="Numero de preguntas" />
        <button id="btn-generar" onclick="generarTestAleatorio()">Generar test</button>
    </div>

    <label class="timer-option">
    <input type="checkbox" id="enable-timer">
    <span>⏱ Añadir temporizador</span>
</label>

</div>



  <div id="quiz-container"></div>

  <div id="controls">
    <button id="prevBtn">⏮️ Anterior</button>
    <button id="nextBtn">⏭️ Siguiente</button>
  </div>
</div>

<!-- ðŸ”¥ AquÃ­ pegamos el manifest generado automÃ¡ticamente -->
<script>
let modoExamen = false;
let aciertos = 0;
let totalExamen = 0;

let preguntasOriginales = [];
let preguntas = [];
let indiceActual = 0;
const TOTAL_PREGUNTAS = 247;

// TIMER opcional
let tiempoRestante = 0;
let intervaloTiempo = null;
const TIEMPO_POR_PREGUNTA = 90; // 90s = 1,5 min

const PASSWORD = "algfrontend25";
const ACCESS_KEY = "access_granted_frontend";


/* ----------- LOGIN ---------------- */
function checkPassword() {
  const input = document.getElementById("login-input").value.trim();
  const error = document.getElementById("login-error");

  if (input === PASSWORD) {
    document.getElementById("login-overlay").style.display = "none";
    localStorage.setItem(ACCESS_KEY, "true");
  } else {
    error.textContent = "Contraseña incorrecta";
  }
}
document.getElementById("login-button").addEventListener("click", checkPassword);
document.getElementById("login-input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") checkPassword();
});


/* ----------- INICIO ---------- */
window.addEventListener("load", () => {
  if (localStorage.getItem(ACCESS_KEY) === "true") {
    document.getElementById("login-overlay").style.display = "none";
  }
  inicializarQuiz();
});


/* -------- CARGAR MANIFEST -------- */
async function inicializarQuiz() {
  try {
    const response = await fetch("manifest.json");
    if (!response.ok) throw new Error("No se pudo cargar manifest.json");

    const data = await response.json();

    preguntas = Object.entries(data).map(([num, info]) => ({
      numero: Number(num),
      pregunta: info.pregunta,
      respuestas: info.respuestas,
      seleccionadas: [],
      resultado: "",
      tipo: info.respuestas.filter(r => r.correcta).length <= 1 ? "simple" : "multiple",
      respondida: false
    }));

    preguntasOriginales = JSON.parse(JSON.stringify(preguntas));
    generarMenu();
    mostrarPregunta(0);
  } catch (error) {
    const cont = document.getElementById("quiz-container");
    cont.innerHTML = "<p style='text-align:center;color:#d32f2f;font-weight:bold;'>No se pudo cargar el test. Revisa el archivo manifest.json.</p>";
    console.error(error);
  }
}


/* -------- MENÃš LATERAL -------- */
function generarMenu() {
  const cont = document.getElementById("menuPreguntas");
  cont.innerHTML = "";

  const total = preguntas.length;
  const porGrupo = 10;

  for (let inicio = 1; inicio <= total; inicio += porGrupo * 2) {
    const row = document.createElement("div");
    row.className = "range-row";

    for (let col = 0; col < 2; col++) {
      const ini = inicio + col * porGrupo;
      if (ini > total) break;

      const fin = Math.min(ini + porGrupo - 1, total);

      const g = document.createElement("div");
      g.className = "range-group";

      const toggle = document.createElement("button");
      toggle.className = "range-toggle";
      toggle.textContent = `${ini}-${fin}`;

      const content = document.createElement("div");
      content.className = "range-content";

      for (let q = ini; q <= fin; q++) {
        const btn = document.createElement("button");
        btn.className = "question-btn";
        btn.textContent = `Pregunta ${q}`;
        btn.dataset.index = q - 1;

        btn.onclick = () => {
          mostrarPregunta(q - 1);
          document.querySelectorAll(".range-content").forEach(x => x.style.display = "none");
        };

        content.appendChild(btn);
      }

      toggle.onclick = () => {
        document.querySelectorAll(".range-content").forEach(x => x.style.display = "none");
        content.style.display = "block";
      };

      g.appendChild(toggle);
      g.appendChild(content);
      row.appendChild(g);
    }

    cont.appendChild(row);
  }
}

function actualizarMenu() {
  document.querySelectorAll(".question-btn").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.dataset.index) === indiceActual);
  });
}


/* -------- MOSTRAR PREGUNTA -------- */
function mostrarPregunta(idx) {
  indiceActual = idx;
  actualizarMenu();

  const p = preguntas[idx];
  const cont = document.getElementById("quiz-container");
  cont.innerHTML = "";

  const box = document.createElement("div");
  box.className = "question";
  box.style.opacity = "0";

  const h = document.createElement("h2");
  h.textContent = `Pregunta ${idx + 1} / ${preguntas.length}`;
  h.style.textAlign = "center";
  h.style.color = "#602b7a";
  box.appendChild(h);

  const colP = document.createElement("div");
  colP.className = "col-pregunta";

  const imgP = new Image();
  imgP.src = p.pregunta;
  colP.appendChild(imgP);

  const divider = document.createElement("div");
  divider.className = "divider";

  const colR = document.createElement("div");
  colR.className = "col-respuestas";

  const answers = document.createElement("div");
  answers.className = "answers";

  p.respuestas.forEach((r, i) => {
    const ab = document.createElement("div");
    ab.className = "answer-box";
    if (p.seleccionadas.includes(i)) ab.classList.add("selected");

    const imgR = new Image();
    imgR.src = r.src;
    ab.dataset.correcta = r.correcta ? "true" : "false";
    ab.appendChild(imgR);

    ab.onclick = () => {
      if (modoExamen && p.respondida) return;
      if (p.tipo === "simple") {
        answers.querySelectorAll(".answer-box").forEach(x => x.classList.remove("selected"));
        p.seleccionadas = [i];
        ab.classList.add("selected");
      } else {
        ab.classList.toggle("selected");
        if (ab.classList.contains("selected"))
          p.seleccionadas.push(i);
        else
          p.seleccionadas = p.seleccionadas.filter(x => x !== i);
      }
    };

    answers.appendChild(ab);
  });

  colR.appendChild(answers);

  const btnC = document.createElement("button");
  btnC.textContent = "Comprobar";
  btnC.onclick = () => comprobar(p, box);
  colR.appendChild(btnC);

  const res = document.createElement("div");
  res.className = "result";
  res.textContent = p.resultado;
  colR.appendChild(res);

  box.appendChild(colP);
  box.appendChild(divider);
  box.appendChild(colR);
  cont.appendChild(box);

  actualizarBotones();
  precargarSiguiente();
  actualizarProgreso();
  actualizarTimerUI();

  let loaded = 0;
  const imgs = box.querySelectorAll("img");
  imgs.forEach(img => {
    img.onload = img.onerror = () => {
      if (++loaded === imgs.length) {
        ajustarAlturaRespuestas();
        box.style.transition = "opacity .25s"; box.style.opacity = "1";
      }
    };
  });
}

function precargarSiguiente() {
  const p = preguntas[indiceActual + 1];
  if (!p) return;
  new Image().src = p.pregunta;
  p.respuestas.forEach(r => new Image().src = r.src);
}


/* -------- COMPROBAR -------- */
function comprobar(p, box) {
  const cajas = box.querySelectorAll(".answer-box");
  const sel = [...cajas].filter(b => b.classList.contains("selected"));
  const correctas = [...cajas].filter(b => b.dataset.correcta === "true");
  const buenas = sel.filter(b => b.dataset.correcta === "true");
  const malas = sel.filter(b => b.dataset.correcta === "false");

  const res = box.querySelector(".result");

  if (!sel.length) {
    res.textContent = "Selecciona una opción.";
    res.className = "result incorrect";
    return;
  }

  if (buenas.length === correctas.length && malas.length === 0) {
    res.textContent = "✅ ¡Respuesta correcta!";
    res.className = "result correct";
    if (modoExamen) aciertos++;
  } else {
    res.textContent = "❌ Respuesta incorrecta";
    res.className = "result incorrect";
  }

  if (modoExamen) {
    cajas.forEach(b => b.style.pointerEvents = "none");
    p.respondida = true;
  }

  actualizarProgreso();
}


/* -------- CONTROL BOTONES -------- */
function actualizarBotones() {
  const prev = document.getElementById("prevBtn");
  const next = document.getElementById("nextBtn");

  prev.style.display = "inline-block";
  next.style.display = "inline-block";

  prev.disabled = indiceActual === 0;
  prev.onclick = () => mostrarPregunta(--indiceActual);

  const ultima = indiceActual === preguntas.length - 1;

  if (modoExamen && ultima) {
    next.textContent = "Finalizar";
    next.onclick = finalizarExamen;
  } else {
    next.textContent = "Siguiente";
    next.disabled = ultima && !modoExamen;
    next.onclick = () => mostrarPregunta(++indiceActual);
  }
}


/* -------- PROGRESO -------- */
function actualizarProgreso() {
  const total = totalExamen || preguntas.length;
  const respondidas = preguntas.filter(p => p.respondida).length;
  const pct = Math.round((respondidas / total) * 100);

  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = `${pct}% completado`;

  if (modoExamen) {
    document.getElementById("contador-examen").textContent =
      `Aciertos: ${aciertos} / ${totalExamen} (${Math.round((aciertos / totalExamen) * 100)}%)`;
  }
}


function ajustarAlturaRespuestas() {
  let maxH = 0;
  const boxes = document.querySelectorAll(".answer-box");
  boxes.forEach(b => b.style.height = "auto");
  boxes.forEach(b => maxH = Math.max(maxH, b.getBoundingClientRect().height));
  boxes.forEach(b => b.style.height = maxH + "px");
}


/* -------- TIMER (Opcional) -------- */
function actualizarTimerUI() {
  const t = document.getElementById("timer-examen");
  if (!modoExamen || !document.getElementById("enable-timer").checked) return;

  let min = Math.floor(tiempoRestante / 60);
  let seg = tiempoRestante % 60;
  if (seg < 10) seg = "0" + seg;

  t.textContent = `⏱ ${min}:${seg}`;
}


/* -------- GENERAR TEST -------- */
function generarTestAleatorio() {
  const n = parseInt(document.getElementById("random-count").value);

  if (!n || n < 1 || n > preguntasOriginales.length) {
    alert("Introduce un número válido.");
    return;
  }

  modoExamen = true;
  aciertos = 0;
  totalExamen = n;

  document.getElementById("contador-examen").style.display = "block";
  document.getElementById("progress-container").style.display = "block";

  const usarTimer = document.getElementById("enable-timer").checked;

  if (usarTimer) {
    document.getElementById("timer-examen").style.display = "block";
    tiempoRestante = n * TIEMPO_POR_PREGUNTA;
    if (intervaloTiempo) clearInterval(intervaloTiempo);
    intervaloTiempo = setInterval(() => {
      tiempoRestante--;
      actualizarTimerUI();
      if (tiempoRestante <= 0) {
        clearInterval(intervaloTiempo);
        alert("⏱ ¡Se acabó el tiempo!");
        finalizarExamen();
      }
    }, 1000);
  } else {
    document.getElementById("timer-examen").style.display = "none";
    if (intervaloTiempo) clearInterval(intervaloTiempo);
  }

  // seleccionar aleatorias
  let ids = [...Array(preguntasOriginales.length).keys()];
  ids.sort(() => Math.random() - 0.5);
  ids = ids.slice(0, n);
  preguntas = ids.map(i => JSON.parse(JSON.stringify(preguntasOriginales[i])));
  preguntas.forEach((p, i) => p.numero = i + 1);

  generarMenu();
  mostrarPregunta(0);
}


/* -------- FINALIZAR EXAMEN -------- */
function finalizarExamen() {
  const usarTimer = document.getElementById("enable-timer").checked;
  if (usarTimer && intervaloTiempo) clearInterval(intervaloTiempo);
  document.getElementById("timer-examen").style.display = "none";

  const pct = Math.round((aciertos / totalExamen) * 100);
  const esApto = pct >= 70;

  const cont = document.getElementById("quiz-container");
  cont.innerHTML = "";

  const d = document.createElement("div");
  d.style.textAlign = "center";

  const h = document.createElement("h2");
  h.textContent = esApto ? "🎉 ¡APTO!" : "❌ NO APTO";
  h.style.color = esApto ? "#2e8b57" : "#d32f2f";

  const p = document.createElement("p");
  p.textContent = `Has acertado ${aciertos} de ${totalExamen} (${pct}%).`;

  const volver = document.createElement("button");
  volver.textContent = "Volver al modo estudio";
  volver.style.marginTop = "20px";
  volver.onclick = volverModoEstudio;

  d.appendChild(h);
  d.appendChild(p);
  d.appendChild(volver);
  cont.appendChild(d);

  document.getElementById("progress-container").style.display = "none";
  document.getElementById("contador-examen").style.display = "none";
  document.getElementById("prevBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}


/* -------- VOLVER MODO ESTUDIO -------- */
function volverModoEstudio() {
  modoExamen = false;
  aciertos = 0;
  totalExamen = 0;

  preguntas = JSON.parse(JSON.stringify(preguntasOriginales));
  preguntas.forEach(p => {
    p.seleccionadas = [];
    p.resultado = "";
    p.respondida = false;
  });

  generarMenu();
  mostrarPregunta(0);

  document.getElementById("prevBtn").style.display = "inline-block";
  document.getElementById("nextBtn").style.display = "inline-block";
}
</script>
